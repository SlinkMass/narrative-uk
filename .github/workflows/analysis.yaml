name: 30-Minute Narrative Audit

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper & Grouping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python news.py

      - name: Trigger Cloud AI Audit
        run: |
          echo "Triggering Vertex AI Audit for new articles..."
          curl -X POST "https://us-central1-narrativeuk.cloudfunctions.net/narrative-uk-brain" \
          -H "Content-Type: application/json" \
          -d '{}'